   </g>
   <g id="text_12">
    <text style="font-size: 7.7px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(70.260875 198.379769)">Audit target: quantify exposure that remains in the deformation-relevant domain</text>
