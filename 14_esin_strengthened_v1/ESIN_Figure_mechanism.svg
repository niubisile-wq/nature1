   </g>
   <g id="text_5">
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(181.233063 63.452122)">Frozen strong-</text>
