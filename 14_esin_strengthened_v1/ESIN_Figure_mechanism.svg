   <g id="text_1">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1f2933" x="19.0854" y="23.211105" transform="rotate(-0 19.0854 23.211105)">Observability-driven exposure bias</text>
   </g>
   <g id="text_2">
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #5b6773" x="19.0854" y="30.584115" transform="rotate(-0 19.0854 30.584115)">Applying a support mask before exposure accounting changes the denominator.</text>
   </g>
   <g id="text_3">
