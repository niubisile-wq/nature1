   </g>
   <g id="text_6">
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(315.305262 63.495481)">Population and</text>
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(311.609309 71.05753)">built-up exposure</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: middle; fill: #1f2933" x="205.29" y="97.648916" transform="rotate(-0 205.29 97.648916)">Exposure accounting step</text>
   </g>
   <g id="text_8">
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(54.501412 133.443485)">Clip deformation-relevant cells</text>
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(69.508959 141.005534)">to valid radar support</text>
   </g>
   <g id="text_9">
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(255.722447 133.355032)">Keep weakly observed support</text>
    <text style="font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #1f2933" transform="translate(266.420072 141.003799)">as an explicit audit class</text>
   </g>
   <g id="text_10">
